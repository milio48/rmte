<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMTE - Remote Terminal Relay</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
    <link rel="stylesheet" href="xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
</head>
<body>
    <div id="setup">
        <h1>RMTE Join</h1>
        <input type="text" id="server" placeholder="ws://localhost:8080/ws" value="ws://localhost:8080/ws">
        <input type="text" id="sessionId" placeholder="Session ID">
        <input type="password" id="password" placeholder="Password">
        <input type="text" id="username" placeholder="Your Name">
        <button onclick="connect()">Connect</button>
    </div>
    <div id="terminal-container" style="display:none;">
        <div id="tabs-bar">
            <div id="tabs"></div>
            <button id="new-tab-btn" onclick="requestNewTab()" title="New Tab">+</button>
        </div>
        <div id="workspace">
            <div id="terminal-wrapper"></div>
            <div id="users-sidebar">
                <h3>Collaborators</h3>
                <div id="users-list"></div>
            </div>
        </div>
    </div>
    <script src="xterm.js"></script>
</body>
</html>
